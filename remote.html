<!DOCTYPE html>
<html>
<head>
    <title>Remote Client</title>
</head>
<body>

<h1 id="status">Waiting...</h1>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

socket.on("execute", (cmd) => {

    document.getElementById("status").innerText = cmd;

});
</script>

</body>
</html>
