<!DOCTYPE html>
<html>
<head>
    <title>Remote Control</title>
</head>
<body>

<h2>Remote Desktop</h2>

<img id="screen" width="800">

<script>

let ws = new WebSocket("ws://192.168.1.10:8765");

ws.onmessage = function(event) {
    document.getElementById("screen").src =
        "data:image/jpeg;base64," + event.data;
};

document.onclick = function(e) {

    let x = e.clientX;
    let y = e.clientY;

    ws.send("move," + x + "," + y);
    ws.send("click");

};

</script>

</body>
</html>
